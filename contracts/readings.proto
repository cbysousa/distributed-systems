syntax = "proto3";

package readings;

import "temperature.proto";
import "air_quality.proto";
import "traffic.proto";

option go_package = "github.com/cbysousa/distributed-systems/internal/proto;proto";

message ReadingPacket {
  string source_name = 1;
  int64 timestamp_unix_ms = 2;

  oneof reading {
    temperature.TemperatureReading temperature = 3;
    airquality.AirQualityReading air_quality = 4;
    traffic.TrafficReading traffic = 5;
  }
}
