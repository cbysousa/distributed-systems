syntax = "proto3";

package semaphore;

option go_package = "github.com/cbysousa/distributed-systems/internal/proto;proto";

enum SemaphoreState {
  SEMAPHORE_STATE_RED = 0;
  SEMAPHORE_STATE_YELLOW = 1;
  SEMAPHORE_STATE_GREEN = 2;
}

message SemaphoreCommand {
  oneof command {
    SemaphoreChangeStateRequest change_state = 1;
    SemaphoreGetStateRequest get_state = 2;
    SemaphoreSetTimerRequest set_timer = 3;
    SemaphoreSimulateFailureRequest simulate_failure = 4;
  }
}

message SemaphoreChangeStateRequest {
  SemaphoreState state = 1;
}

message SemaphoreGetStateRequest {}

message SemaphoreSetTimerRequest {
  int32 timer_seconds = 1;
}

message SemaphoreSimulateFailureRequest {}

message SemaphoreResponse {
  bool success = 1;
  string message = 2;
  SemaphoreState state = 3;
  int32 timer_seconds = 4;
  string status = 5;
}
