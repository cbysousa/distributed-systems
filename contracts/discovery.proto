syntax = "proto3";

package discovery;

option go_package = "github.com/cbysousa/distributed-systems/internal/proto;proto";

message DiscoveryRequest {
  string gateway_id = 1;
  string gateway_ip = 2;
  int32 readings_port = 3;
  int32 client_port = 4;
}

message DiscoveryResponse {
  string source_name = 1;
  string source_type = 2;
  string ip = 3;
  int32 control_port = 4;
  bool controllable = 5;
  string status = 6;
}
